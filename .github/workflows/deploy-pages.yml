name: Deploy to GitHub Pages

# Publishes `dist` to the `gh-pages` branch. In the repo: Settings → Pages →
# Source: Deploy from a branch → Branch: gh-pages, folder: / (root).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: NPM_CONFIG_PRODUCTION=false npm ci
      - name: Build (embed multiplayer WebSocket URL)
        run: npm run build
        env:
          # Repo → Settings → Secrets → Actions → add VITE_WS_URL, e.g. wss://your-app.onrender.com
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
