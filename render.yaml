# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → Connect this repo → apply this file.

services:
  - type: web
    name: color-game
    runtime: node
    plan: free
    region: oregon
    # Render sets NODE_ENV=production on the service; plain `npm ci` then skips
    # devDependencies (no Vite → build fails). Force dev deps for the install step.
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && VITE_BASE_PATH=/ npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Static hosting uses SERVE_STATIC; avoid NODE_ENV here so build sees devDependencies.
      - key: SERVE_STATIC
        value: "1"
      - key: NODE_VERSION
        value: "22"
